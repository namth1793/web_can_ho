server {
    listen 80;
    server_name oanhhome.vn www.oanhhome.vn;

    # Redirect HTTP → HTTPS (bỏ comment khi đã có SSL)
    # return 301 https://$host$request_uri;

    root /var/www/chungcugiarehn/frontend/dist;
    index index.html;

    # Proxy /api → Node.js backend
    location /api/ {
        proxy_pass http://localhost:5021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 15M;
    }

    # SSE endpoint — tắt buffering
    location /api/events {
        proxy_pass http://localhost:5021;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA — fallback về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

